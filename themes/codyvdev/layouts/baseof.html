<!doctype html>
<html
	lang="{{ site.Language.Locale }}"
	dir="{{ or site.Language.Direction `ltr` }}">
	<head>
		{{ partial "head.html" . }}
	</head>
	<body>
		<header>
			<div class="inner">{{ partial "header.html" . }}</div>
		</header>
		<main>{{ block "main" . }}{{ end }}</main>
		<footer>
			<div class="inner">{{ partial "footer.html" . }}</div>
		</footer>
	</body>
</html>
